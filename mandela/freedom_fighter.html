<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freedom Fighter Pics</title>
  <link rel="stylesheet" href="freedom_fighter.css">
</head>
<body>
  <h1>Freedom Fighter Pics!</h1>
  <img src="mandela_head.jpg" alt="Portrait of Nelson Mandela" />

  <div id="pics">
    <img class="mandela" src="mandela1.jpg" alt="Mandela 1" />
    <img class="mandela" src="mandela2.jpg" alt="Mandela 2" />
    <img class="mandela" src="mandela3.jpg" alt="Mandela 3" />
    <img class="mandela" src="mandela4.jpg" alt="Mandela 4" />
    <img class="mandela" src="mandela5.jpg" alt="Mandela 5" />
    <img class="mandela" src="mandela6.jpg" alt="Mandela 6" />
  </div>

  <p>Click a picture to move it to the favorites.</p>

  <p id="counter"></p>
  <p id="message"></p>

  <fieldset id="favorites">
    <legend>Favorite photos:</legend>
  </fieldset>

  <ul id="actions"></ul>

  <script src="freedom_fighter.js"></script>
</body>
</html>
